<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMax slice">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eef3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4dfe8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8c6db;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="buildingGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a8fa3;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#6b7f92;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="buildingGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5c6f82;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#4d6578;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1200" height="600" fill="url(#skyGradient)"/>
  
  <!-- Circuit board patterns - subtle background -->
  <g opacity="0.15" stroke="#5a7a9a" stroke-width="1.5" fill="none">
    <path d="M 100 80 L 100 150 L 180 150 L 180 220"/>
    <circle cx="100" cy="80" r="4" fill="#5a7a9a"/>
    <circle cx="180" cy="150" r="3" fill="#5a7a9a"/>
    <circle cx="180" cy="220" r="3" fill="#5a7a9a"/>
    
    <path d="M 300 60 L 300 120 L 380 120 L 380 180"/>
    <circle cx="300" cy="60" r="4" fill="#5a7a9a"/>
    <circle cx="380" cy="120" r="3" fill="#5a7a9a"/>
    
    <path d="M 500 40 L 500 100 L 580 100"/>
    <circle cx="500" cy="40" r="4" fill="#5a7a9a"/>
    <circle cx="580" cy="100" r="3" fill="#5a7a9a"/>
    
    <path d="M 700 50 L 700 110 L 780 110 L 780 170"/>
    <circle cx="700" cy="50" r="4" fill="#5a7a9a"/>
    <circle cx="780" cy="110" r="3" fill="#5a7a9a"/>
    
    <path d="M 900 70 L 900 130 L 980 130"/>
    <circle cx="900" cy="70" r="4" fill="#5a7a9a"/>
    <circle cx="980" cy="130" r="3" fill="#5a7a9a"/>
    
    <path d="M 1100 90 L 1100 150"/>
    <circle cx="1100" cy="90" r="4" fill="#5a7a9a"/>
  </g>
  
  <!-- Background buildings - distant layer -->
  <g opacity="0.5">
    <rect x="50" y="350" width="60" height="250" fill="#9ab0c4"/>
    <rect x="130" y="320" width="50" height="280" fill="#8a9fb3"/>
    <rect x="200" y="380" width="70" height="220" fill="#9ab0c4"/>
    <rect x="850" y="340" width="65" height="260" fill="#8a9fb3"/>
    <rect x="930" y="360" width="55" height="240" fill="#9ab0c4"/>
    <rect x="1000" y="330" width="70" height="270" fill="#8a9fb3"/>
    <rect x="1080" y="350" width="60" height="250" fill="#9ab0c4"/>
  </g>
  
  <!-- Middle layer buildings -->
  <g opacity="0.7">
    <rect x="30" y="280" width="80" height="320" fill="url(#buildingGrad1)"/>
    <rect x="120" y="250" width="70" height="350" fill="#6b7f92"/>
    <rect x="200" y="300" width="85" height="300" fill="url(#buildingGrad1)"/>
    <rect x="300" y="220" width="75" height="380" fill="#5c6f82"/>
    <rect x="820" y="260" width="90" height="340" fill="#6b7f92"/>
    <rect x="920" y="290" width="80" height="310" fill="url(#buildingGrad1)"/>
    <rect x="1010" y="240" width="75" height="360" fill="#5c6f82"/>
  </g>
  
  <!-- Front layer - main prominent buildings -->
  <g>
    <!-- Left side prominent buildings -->
    <rect x="20" y="180" width="100" height="420" fill="url(#buildingGrad2)"/>
    <!-- Circuit pattern -->
    <g opacity="0.3" stroke="#7a9ab8" stroke-width="1.5">
      <line x1="35" y1="200" x2="105" y2="200"/>
      <line x1="50" y1="200" x2="50" y2="250"/>
      <line x1="80" y1="200" x2="80" y2="240"/>
      <circle cx="50" cy="250" r="3" fill="#7a9ab8"/>
      <circle cx="80" cy="240" r="3" fill="#7a9ab8"/>
      <line x1="35" y1="280" x2="105" y2="280"/>
    </g>
    
    <rect x="130" y="150" width="85" height="450" fill="#4d6578"/>
    <rect x="230" y="200" width="95" height="400" fill="url(#buildingGrad2)"/>
    
    <!-- Center iconic building with spire -->
    <rect x="340" y="120" width="80" height="480" fill="#4d6578"/>
    <rect x="360" y="80" width="40" height="40" fill="#3d5568"/>
    <polygon points="360,80 380,40 400,80" fill="#2d4558"/>
    <!-- Spire circuit pattern -->
    <g opacity="0.25" stroke="#7a9ab8" stroke-width="1.5">
      <line x1="355" y1="140" x2="405" y2="140"/>
      <line x1="380" y1="140" x2="380" y2="200"/>
      <circle cx="380" cy="200" r="3" fill="#7a9ab8"/>
    </g>
    
    <!-- Right side prominent buildings -->
    <rect x="450" y="160" width="90" height="440" fill="#4d6578"/>
    <rect x="560" y="140" width="75" height="460" fill="url(#buildingGrad2)"/>
    
    <!-- Far right buildings -->
    <rect x="720" y="190" width="85" height="410" fill="#4d6578"/>
    <!-- Circuit pattern -->
    <g opacity="0.3" stroke="#7a9ab8" stroke-width="1.5">
      <line x1="735" y1="210" x2="790" y2="210"/>
      <line x1="755" y1="210" x2="755" y2="260"/>
      <line x1="775" y1="210" x2="775" y2="250"/>
      <circle cx="755" cy="260" r="3" fill="#7a9ab8"/>
      <circle cx="775" cy="250" r="3" fill="#7a9ab8"/>
    </g>
    
    <rect x="820" y="170" width="80" height="430" fill="url(#buildingGrad2)"/>
    <rect x="920" y="210" width="70" height="390" fill="#4d6578"/>
    <rect x="1000" y="180" width="85" height="420" fill="url(#buildingGrad2)"/>
  </g>
  
  <!-- Windows with subtle glow effect -->
  <g>
    <!-- Building 1 windows -->
    <rect x="35" y="220" width="12" height="15" fill="rgba(180,210,240,0.5)"/>
    <rect x="55" y="220" width="12" height="15" fill="rgba(180,210,240,0.6)"/>
    <rect x="75" y="220" width="12" height="15" fill="rgba(180,210,240,0.5)"/>
    <rect x="95" y="220" width="12" height="15" fill="rgba(180,210,240,0.6)"/>
    
    <rect x="35" y="250" width="12" height="15" fill="rgba(180,210,240,0.6)"/>
    <rect x="55" y="250" width="12" height="15" fill="rgba(180,210,240,0.5)"/>
    <rect x="75" y="250" width="12" height="15" fill="rgba(180,210,240,0.6)"/>
    <rect x="95" y="250" width="12" height="15" fill="rgba(180,210,240,0.5)"/>
    
    <!-- Building 2 windows -->
    <rect x="140" y="180" width="10" height="12" fill="rgba(180,210,240,0.6)"/>
    <rect x="160" y="180" width="10" height="12" fill="rgba(180,210,240,0.5)"/>
    <rect x="180" y="180" width="10" height="12" fill="rgba(180,210,240,0.6)"/>
    <rect x="200" y="180" width="10" height="12" fill="rgba(180,210,240,0.5)"/>
    
    <!-- Center building windows -->
    <rect x="355" y="160" width="14" height="16" fill="rgba(180,210,240,0.7)"/>
    <rect x="375" y="160" width="14" height="16" fill="rgba(180,210,240,0.5)"/>
    <rect x="395" y="160" width="14" height="16" fill="rgba(180,210,240,0.6)"/>
    
    <rect x="355" y="190" width="14" height="16" fill="rgba(180,210,240,0.5)"/>
    <rect x="375" y="190" width="14" height="16" fill="rgba(180,210,240,0.7)"/>
    <rect x="395" y="190" width="14" height="16" fill="rgba(180,210,240,0.5)"/>
    
    <!-- Right side windows -->
    <rect x="740" y="230" width="12" height="14" fill="rgba(180,210,240,0.6)"/>
    <rect x="760" y="230" width="12" height="14" fill="rgba(180,210,240,0.5)"/>
    <rect x="780" y="230" width="12" height="14" fill="rgba(180,210,240,0.6)"/>
  </g>
  
  <!-- Tech/cyber lines overlay -->
  <g opacity="0.1" stroke="#4a7a9a" stroke-width="1" fill="none">
    <path d="M 0 500 L 200 500 L 200 450 L 350 450"/>
    <path d="M 1200 520 L 950 520 L 950 480 L 800 480"/>
    <path d="M 400 550 L 600 550 L 600 520 L 750 520"/>
  </g>
  
  <!-- Ground/water reflection -->
  <rect x="0" y="580" width="1200" height="20" fill="#9ab0c4" opacity="0.3"/>
</svg>
