<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Sky gradient - clear, no fog -->
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e8f0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d0dce8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0d0e0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Building gradients - sharp, clear -->
    <linearGradient id="b1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8aa4b8;stop-opacity:0.95" />
      <stop offset="50%" style="stop-color:#7a94a8;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#6a8498;stop-opacity:0.95" />
    </linearGradient>
    
    <linearGradient id="b2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a94a8;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#5a7488;stop-opacity:0.95" />
    </linearGradient>
    
    <linearGradient id="b3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6a8498;stop-opacity:0.98" />
      <stop offset="100%" style="stop-color:#4a6478;stop-opacity:0.98" />
    </linearGradient>
    
    <linearGradient id="spire" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5a7488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a5468;stop-opacity:1" />
    </linearGradient>
    
    <!-- Circuit line pattern -->
    <pattern id="circuitLines" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <path d="M 20 20 L 20 100 L 80 100" stroke="#5a8aa8" stroke-width="1" fill="none" opacity="0.25"/>
      <circle cx="20" cy="20" r="2.5" fill="#5a8aa8" opacity="0.3"/>
      <circle cx="80" cy="100" r="2" fill="#5a8aa8" opacity="0.3"/>
      
      <path d="M 120 40 L 120 120 L 180 120" stroke="#5a8aa8" stroke-width="1" fill="none" opacity="0.2"/>
      <circle cx="120" cy="40" r="2" fill="#5a8aa8" opacity="0.25"/>
      <circle cx="180" cy="120" r="1.5" fill="#5a8aa8" opacity="0.25"/>
    </pattern>
    
    <!-- Glow for windows -->
    <filter id="windowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Full page background - clear sky -->
  <rect width="1920" height="1200" fill="url(#sky)"/>
  
  <!-- Top area circuit board lines - subtle tech pattern -->
  <g opacity="0.12">
    <path d="M 0 80 L 150 80 L 150 200 L 300 200" stroke="#4a7a9a" stroke-width="1.5" fill="none"/>
    <circle cx="150" cy="80" r="4" fill="#4a7a9a"/>
    <circle cx="300" cy="200" r="3" fill="#4a7a9a"/>
    
    <path d="M 400 60 L 400 180 L 550 180 L 550 300" stroke="#4a7a9a" stroke-width="1.5" fill="none"/>
    <circle cx="400" cy="60" r="4" fill="#4a7a9a"/>
    <circle cx="550" cy="180" r="3" fill="#4a7a9a"/>
    
    <path d="M 700 40 L 700 160 L 850 160" stroke="#4a7a9a" stroke-width="1.5" fill="none"/>
    <circle cx="700" cy="40" r="4" fill="#4a7a9a"/>
    <circle cx="850" cy="160" r="3" fill="#4a7a9a"/>
    
    <path d="M 1000 70 L 1000 190 L 1150 190 L 1150 310" stroke="#4a7a9a" stroke-width="1.5" fill="none"/>
    <circle cx="1000" cy="70" r="4" fill="#4a7a9a"/>
    <circle cx="1150" cy="190" r="3" fill="#4a7a9a"/>
    
    <path d="M 1300 50 L 1300 170 L 1450 170" stroke="#4a7a9a" stroke-width="1.5" fill="none"/>
    <circle cx="1300" cy="50" r="4" fill="#4a7a9a"/>
    <circle cx="1450" cy="170" r="3" fill="#4a7a9a"/>
    
    <path d="M 1600 90 L 1600 210 L 1750 210 L 1750 330" stroke="#4a7a9a" stroke-width="1.5" fill="none"/>
    <circle cx="1600" cy="90" r="4" fill="#4a7a9a"/>
    <circle cx="1750" cy="210" r="3" fill="#4a7a9a"/>
    
    <path d="M 1850 120 L 1850 240" stroke="#4a7a9a" stroke-width="1.5" fill="none"/>
    <circle cx="1850" cy="120" r="4" fill="#4a7a9a"/>
  </g>
  
  <!-- Circuit pattern overlay for tech aesthetic -->
  <rect width="1920" height="600" fill="url(#circuitLines)" opacity="0.15"/>
  
  <!-- BACKGROUND BUILDINGS - distant, lighter -->
  <g opacity="0.35">
    <rect x="30" y="550" width="70" height="650" fill="#a0b8c8"/>
    <rect x="110" y="520" width="60" height="680" fill="#90a8b8"/>
    <rect x="180" y="580" width="80" height="620" fill="#a0b8c8"/>
    <rect x="280" y="540" width="65" height="660" fill="#90a8b8"/>
    <rect x="360" y="560" width="75" height="640" fill="#a0b8c8"/>
    
    <rect x="1440" y="530" width="70" height="670" fill="#90a8b8"/>
    <rect x="1520" y="550" width="65" height="650" fill="#a0b8c8"/>
    <rect x="1600" y="510" width="80" height="690" fill="#90a8b8"/>
    <rect x="1700" y="540" width="70" height="660" fill="#a0b8c8"/>
    <rect x="1790" y="520" width="75" height="680" fill="#90a8b8"/>
    <rect x="1870" y="560" width="50" height="640" fill="#a0b8c8"/>
  </g>
  
  <!-- MID-GROUND BUILDINGS -->
  <g opacity="0.55">
    <rect x="10" y="450" width="90" height="750" fill="url(#b1)"/>
    <rect x="110" y="400" width="80" height="800" fill="url(#b2)"/>
    <rect x="200" y="430" width="100" height="770" fill="url(#b1)"/>
    <rect x="310" y="380" width="85" height="820" fill="url(#b2)"/>
    <rect x="410" y="420" width="95" height="780" fill="url(#b1)"/>
    <rect x="520" y="390" width="80" height="810" fill="url(#b2)"/>
    
    <rect x="1300" y="410" width="90" height="790" fill="url(#b2)"/>
    <rect x="1400" y="440" width="85" height="760" fill="url(#b1)"/>
    <rect x="1500" y="400" width="95" height="800" fill="url(#b2)"/>
    <rect x="1610" y="430" width="80" height="770" fill="url(#b1)"/>
    <rect x="1710" y="410" width="90" height="790" fill="url(#b2)"/>
    <rect x="1820" y="450" width="70" height="750" fill="url(#b1)"/>
  </g>
  
  <!-- FOREGROUND BUILDINGS - sharp, detailed -->
  <g>
    <!-- Left foreground cluster -->
    <rect x="60" y="320" width="110" height="880" fill="url(#b3)"/>
    <!-- Circuit pattern on building -->
    <g opacity="0.3" stroke="#6a9ab8" stroke-width="1.5" fill="none">
      <line x1="80" y1="340" x2="150" y2="340"/>
      <line x1="95" y1="340" x2="95" y2="420"/>
      <line x1="130" y1="340" x2="130" y2="400"/>
      <circle cx="95" cy="420" r="3" fill="#6a9ab8"/>
      <circle cx="130" cy="400" r="2.5" fill="#6a9ab8"/>
      <line x1="80" y1="460" x2="150" y2="460"/>
      <line x1="115" y1="460" x2="115" y2="540"/>
      <circle cx="115" cy="540" r="2.5" fill="#6a9ab8"/>
    </g>
    
    <rect x="190" y="280" width="100" height="920" fill="url(#b2)"/>
    <g opacity="0.25" stroke="#6a9ab8" stroke-width="1.5" fill="none">
      <line x1="210" y1="300" x2="270" y2="300"/>
      <line x1="230" y1="300" x2="230" y2="380"/>
      <circle cx="230" cy="380" r="3" fill="#6a9ab8"/>
    </g>
    
    <rect x="310" y="300" width="120" height="900" fill="url(#b3)"/>
    
    <!-- CENTER - Prominent tower -->
    <rect x="480" y="250" width="140" height="950" fill="url(#b3)"/>
    <!-- Detailed circuit pattern -->
    <g opacity="0.35" stroke="#6a9ab8" stroke-width="2" fill="none">
      <line x1="505" y1="275" x2="595" y2="275"/>
      <line x1="530" y1="275" x2="530" y2="360"/>
      <line x1="570" y1="275" x2="570" y2="340"/>
      <circle cx="530" cy="360" r="3.5" fill="#6a9ab8"/>
      <circle cx="570" cy="340" r="3" fill="#6a9ab8"/>
      
      <line x1="505" y1="400" x2="595" y2="400"/>
      <line x1="550" y1="400" x2="550" y2="480"/>
      <circle cx="550" cy="480" r="3" fill="#6a9ab8"/>
      
      <line x1="505" y1="520" x2="595" y2="520"/>
      <line x1="520" y1="520" x2="520" y2="600"/>
      <line x1="580" y1="520" x2="580" y2="580"/>
      <circle cx="520" cy="600" r="3" fill="#6a9ab8"/>
      <circle cx="580" cy="580" r="2.5" fill="#6a9ab8"/>
    </g>
    
    <!-- Spire building - iconic -->
    <rect x="530" y="160" width="60" height="90" fill="url(#spire)"/>
    <polygon points="530,160 560,100 590,160" fill="#2a4458"/>
    <rect x="545" y="120" width="30" height="40" fill="url(#spire)"/>
    
    <!-- Right of center -->
    <rect x="660" y="310" width="110" height="890" fill="url(#b2)"/>
    <rect x="790" y="270" width="100" height="930" fill="url(#b3)"/>
    <rect x="910" y="330" width="105" height="870" fill="url(#b2)"/>
    
    <!-- Right foreground cluster -->
    <rect x="1040" y="290" width="120" height="910" fill="url(#b3)"/>
    <g opacity="0.3" stroke="#6a9ab8" stroke-width="1.5" fill="none">
      <line x1="1060" y1="310" x2="1140" y2="310"/>
      <line x1="1080" y1="310" x2="1080" y2="390"/>
      <line x1="1120" y1="310" x2="1120" y2="370"/>
      <circle cx="1080" cy="390" r="3" fill="#6a9ab8"/>
      <circle cx="1120" cy="370" r="2.5" fill="#6a9ab8"/>
      <line x1="1060" y1="430" x2="1140" y2="430"/>
      <line x1="1100" y1="430" x2="1100" y2="510"/>
      <circle cx="1100" cy="510" r="2.5" fill="#6a9ab8"/>
    </g>
    
    <rect x="1180" y="320" width="100" height="880" fill="url(#b2)"/>
    <rect x="1300" y="300" width="110" height="900" fill="url(#b3)"/>
    <rect x="1430" y="280" width="90" height="920" fill="url(#b2)"/>
    <rect x="1540" y="310" width="100" height="890" fill="url(#b3)"/>
    <rect x="1660" y="290" width="85" height="910" fill="url(#b2)"/>
    <rect x="1760" y="330" width="95" height="870" fill="url(#b3)"/>
    <rect x="1870" y="300" width="50" height="900" fill="url(#b2)"/>
  </g>
  
  <!-- WINDOWS - glowing effect -->
  <g filter="url(#windowGlow)">
    <!-- Left buildings -->
    <rect x="80" y="360" width="12" height="16" fill="#b8d8f0" opacity="0.7"/>
    <rect x="100" y="360" width="12" height="16" fill="#b8d8f0" opacity="0.6"/>
    <rect x="120" y="360" width="12" height="16" fill="#b8d8f0" opacity="0.7"/>
    <rect x="80" y="390" width="12" height="16" fill="#b8d8f0" opacity="0.6"/>
    <rect x="100" y="390" width="12" height="16" fill="#b8d8f0" opacity="0.7"/>
    <rect x="120" y="390" width="12" height="16" fill="#b8d8f0" opacity="0.6"/>
    
    <!-- Center tower windows -->
    <rect x="505" y="290" width="15" height="20" fill="#b8d8f0" opacity="0.75"/>
    <rect x="530" y="290" width="15" height="20" fill="#b8d8f0" opacity="0.65"/>
    <rect x="555" y="290" width="15" height="20" fill="#b8d8f0" opacity="0.7"/>
    <rect x="580" y="290" width="15" height="20" fill="#b8d8f0" opacity="0.65"/>
    <rect x="605" y="290" width="15" height="20" fill="#b8d8f0" opacity="0.75"/>
    
    <rect x="505" y="330" width="15" height="20" fill="#b8d8f0" opacity="0.65"/>
    <rect x="530" y="330" width="15" height="20" fill="#b8d8f0" opacity="0.75"/>
    <rect x="555" y="330" width="15" height="20" fill="#b8d8f0" opacity="0.65"/>
    <rect x="580" y="330" width="15" height="20" fill="#b8d8f0" opacity="0.7"/>
    <rect x="605" y="330" width="15" height="20" fill="#b8d8f0" opacity="0.65"/>
    
    <rect x="505" y="370" width="15" height="20" fill="#b8d8f0" opacity="0.7"/>
    <rect x="530" y="370" width="15" height="20" fill="#b8d8f0" opacity="0.65"/>
    <rect x="555" y="370" width="15" height="20" fill="#b8d8f0" opacity="0.75"/>
    <rect x="580" y="370" width="15" height="20" fill="#b8d8f0" opacity="0.65"/>
    <rect x="605" y="370" width="15" height="20" fill="#b8d8f0" opacity="0.7"/>
    
    <!-- Right side windows -->
    <rect x="1060" y="330" width="12" height="16" fill="#b8d8f0" opacity="0.7"/>
    <rect x="1080" y="330" width="12" height="16" fill="#b8d8f0" opacity="0.6"/>
    <rect x="1100" y="330" width="12" height="16" fill="#b8d8f0" opacity="0.7"/>
    <rect x="1120" y="330" width="12" height="16" fill="#b8d8f0" opacity="0.6"/>
    
    <rect x="1060" y="360" width="12" height="16" fill="#b8d8f0" opacity="0.6"/>
    <rect x="1080" y="360" width="12" height="16" fill="#b8d8f0" opacity="0.7"/>
    <rect x="1100" y="360" width="12" height="16" fill="#b8d8f0" opacity="0.6"/>
    <rect x="1120" y="360" width="12" height="16" fill="#b8d8f0" opacity="0.7"/>
  </g>
  
  <!-- Bottom tech lines - subtle -->
  <g opacity="0.08" stroke="#3a7a9a" stroke-width="1.5" fill="none">
    <path d="M 0 1000 L 400 1000 L 400 950 L 700 950"/>
    <path d="M 1920 1020 L 1500 1020 L 1500 970 L 1200 970"/>
    <path d="M 800 1050 L 1200 1050 L 1200 1000 L 1500 1000"/>
  </g>
</svg>
