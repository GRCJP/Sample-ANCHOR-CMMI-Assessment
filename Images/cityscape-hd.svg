<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMax slice">
  <defs>
    <!-- Gradients -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eef3;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#d4dfe8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8c6db;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="building1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8aa0b8;stop-opacity:0.95" />
      <stop offset="50%" style="stop-color:#7a90a8;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#6b8199;stop-opacity:0.95" />
    </linearGradient>
    
    <linearGradient id="building2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7a90a8;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#5c7388;stop-opacity:0.95" />
    </linearGradient>
    
    <linearGradient id="building3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6b8199;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#4d6578;stop-opacity:0.95" />
    </linearGradient>
    
    <linearGradient id="windowGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8e0f8;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#a8d0f0;stop-opacity:0.6" />
    </linearGradient>
    
    <!-- Circuit pattern -->
    <pattern id="circuitPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 10 10 L 10 50 L 40 50" stroke="#6a9ab8" stroke-width="1.5" fill="none" opacity="0.4"/>
      <circle cx="10" cy="10" r="3" fill="#6a9ab8" opacity="0.5"/>
      <circle cx="40" cy="50" r="2" fill="#6a9ab8" opacity="0.5"/>
      <path d="M 60 20 L 60 60 L 90 60" stroke="#6a9ab8" stroke-width="1.5" fill="none" opacity="0.3"/>
      <circle cx="60" cy="20" r="2.5" fill="#6a9ab8" opacity="0.4"/>
    </pattern>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Sky background -->
  <rect width="1920" height="1080" fill="url(#skyGrad)"/>
  
  <!-- Top circuit board lines (tech overlay) -->
  <g opacity="0.15" stroke="#5a8aa8" stroke-width="1.5" fill="none">
    <path d="M 100 50 L 100 120 L 200 120 L 200 200"/>
    <circle cx="100" cy="50" r="4" fill="#5a8aa8"/>
    <circle cx="200" cy="120" r="3" fill="#5a8aa8"/>
    <circle cx="200" cy="200" r="3" fill="#5a8aa8"/>
    
    <path d="M 400 30 L 400 100 L 500 100 L 500 180"/>
    <circle cx="400" cy="30" r="4" fill="#5a8aa8"/>
    <circle cx="500" cy="100" r="3" fill="#5a8aa8"/>
    
    <path d="M 700 60 L 700 130 L 800 130"/>
    <circle cx="700" cy="60" r="4" fill="#5a8aa8"/>
    <circle cx="800" cy="130" r="3" fill="#5a8aa8"/>
    
    <path d="M 1000 40 L 1000 110 L 1100 110 L 1100 190"/>
    <circle cx="1000" cy="40" r="4" fill="#5a8aa8"/>
    <circle cx="1100" cy="110" r="3" fill="#5a8aa8"/>
    
    <path d="M 1300 70 L 1300 140 L 1400 140"/>
    <circle cx="1300" cy="70" r="4" fill="#5a8aa8"/>
    <circle cx="1400" cy="140" r="3" fill="#5a8aa8"/>
    
    <path d="M 1600 50 L 1600 120 L 1700 120 L 1700 200"/>
    <circle cx="1600" cy="50" r="4" fill="#5a8aa8"/>
    <circle cx="1700" cy="120" r="3" fill="#5a8aa8"/>
    
    <path d="M 1850 80 L 1850 150"/>
    <circle cx="1850" cy="80" r="4" fill="#5a8aa8"/>
  </g>
  
  <!-- Distant background buildings -->
  <g opacity="0.4">
    <rect x="50" y="650" width="80" height="430" fill="#aabfd3"/>
    <rect x="150" y="620" width="60" height="460" fill="#9ab0c8"/>
    <rect x="240" y="680" width="70" height="400" fill="#aabfd3"/>
    <rect x="330" y="640" width="90" height="440" fill="#9ab0c8"/>
    
    <rect x="1500" y="630" width="85" height="450" fill="#9ab0c8"/>
    <rect x="1600" y="660" width="75" height="420" fill="#aabfd3"/>
    <rect x="1700" y="610" width="80" height="470" fill="#9ab0c8"/>
    <rect x="1800" y="680" width="70" height="400" fill="#aabfd3"/>
  </g>
  
  <!-- Mid-ground buildings -->
  <g opacity="0.65">
    <rect x="20" y="550" width="100" height="530" fill="url(#building1)"/>
    <rect x="130" y="480" width="90" height="600" fill="url(#building2)"/>
    <rect x="230" y="520" width="110" height="560" fill="url(#building1)"/>
    <rect x="360" y="450" width="95" height="630" fill="url(#building2)"/>
    <rect x="470" y="500" width="105" height="580" fill="url(#building1)"/>
    
    <rect x="1340" y="490" width="100" height="590" fill="url(#building2)"/>
    <rect x="1460" y="530" width="90" height="550" fill="url(#building1)"/>
    <rect x="1570" y="470" width="110" height="610" fill="url(#building2)"/>
    <rect x="1700" y="510" width="85" height="570" fill="url(#building1)"/>
    <rect x="1800" y="480" width="95" height="600" fill="url(#building2)"/>
  </g>
  
  <!-- Foreground - prominent buildings with circuit patterns -->
  <g>
    <!-- Left cluster -->
    <rect x="80" y="380" width="120" height="700" fill="url(#building3)"/>
    <rect x="80" y="380" width="120" height="700" fill="url(#circuitPattern)" opacity="0.2"/>
    <!-- Building circuit lines -->
    <g opacity="0.35" stroke="#8ab8d8" stroke-width="2" fill="none">
      <line x1="100" y1="400" x2="180" y2="400"/>
      <line x1="120" y1="400" x2="120" y2="480"/>
      <line x1="160" y1="400" x2="160" y2="460"/>
      <circle cx="120" cy="480" r="4" fill="#8ab8d8"/>
      <circle cx="160" cy="460" r="3" fill="#8ab8d8"/>
    </g>
    
    <rect x="220" y="320" width="100" height="760" fill="url(#building2)"/>
    <rect x="220" y="320" width="100" height="760" fill="url(#circuitPattern)" opacity="0.15"/>
    <g opacity="0.3" stroke="#8ab8d8" stroke-width="2" fill="none">
      <line x1="240" y1="340" x2="300" y2="340"/>
      <line x1="260" y1="340" x2="260" y2="420"/>
      <circle cx="260" cy="420" r="3" fill="#8ab8d8"/>
    </g>
    
    <rect x="340" y="350" width="130" height="730" fill="url(#building3)"/>
    
    <!-- Center - iconic Baltimore buildings -->
    <!-- Tall central tower -->
    <rect x="520" y="280" width="140" height="800" fill="url(#building3)"/>
    <rect x="520" y="280" width="140" height="800" fill="url(#circuitPattern)" opacity="0.25"/>
    <!-- Circuit pattern on tower -->
    <g opacity="0.4" stroke="#8ab8d8" stroke-width="2" fill="none">
      <line x1="540" y1="300" x2="640" y2="300"/>
      <line x1="560" y1="300" x2="560" y2="400"/>
      <line x1="610" y1="300" x2="610" y2="380"/>
      <circle cx="560" cy="400" r="4" fill="#8ab8d8"/>
      <circle cx="610" cy="380" r="3" fill="#8ab8d8"/>
      <line x1="540" y1="450" x2="640" y2="450"/>
      <line x1="590" y1="450" x2="590" y2="550"/>
      <circle cx="590" cy="550" r="3" fill="#8ab8d8"/>
    </g>
    
    <!-- Spire building -->
    <rect x="560" y="180" width="60" height="100" fill="#3d5568"/>
    <polygon points="560,180 590,120 620,180" fill="#2d4558"/>
    <rect x="570" y="140" width="40" height="40" fill="#3d5568"/>
    
    <!-- Right of center cluster -->
    <rect x="700" y="340" width="110" height="740" fill="url(#building2)"/>
    <rect x="830" y="300" width="95" height="780" fill="url(#building3)"/>
    <rect x="940" y="360" width="105" height="720" fill="url(#building2)"/>
    
    <!-- Right side prominent buildings -->
    <rect x="1080" y="330" width="125" height="750" fill="url(#building3)"/>
    <rect x="1080" y="330" width="125" height="750" fill="url(#circuitPattern)" opacity="0.2"/>
    <g opacity="0.35" stroke="#8ab8d8" stroke-width="2" fill="none">
      <line x1="1100" y1="350" x2="1185" y2="350"/>
      <line x1="1120" y1="350" x2="1120" y2="450"/>
      <line x1="1160" y1="350" x2="1160" y2="430"/>
      <circle cx="1120" cy="450" r="4" fill="#8ab8d8"/>
      <circle cx="1160" cy="430" r="3" fill="#8ab8d8"/>
    </g>
    
    <rect x="1220" y="380" width="100" height="700" fill="url(#building2)"/>
    
    <!-- Far right buildings -->
    <rect x="1420" y="350" width="115" height="730" fill="url(#building3)"/>
    <rect x="1550" y="320" width="90" height="760" fill="url(#building2)"/>
    <rect x="1660" y="360" width="100" height="720" fill="url(#building3)"/>
  </g>
  
  <!-- Windows with glow effect -->
  <g filter="url(#glow)">
    <!-- Left building windows -->
    <rect x="100" y="420" width="15" height="20" fill="url(#windowGlow)"/>
    <rect x="125" y="420" width="15" height="20" fill="url(#windowGlow)" opacity="0.8"/>
    <rect x="150" y="420" width="15" height="20" fill="url(#windowGlow)"/>
    <rect x="100" y="460" width="15" height="20" fill="url(#windowGlow)" opacity="0.9"/>
    <rect x="125" y="460" width="15" height="20" fill="url(#windowGlow)"/>
    <rect x="150" y="460" width="15" height="20" fill="url(#windowGlow)" opacity="0.7"/>
    
    <!-- Tower windows -->
    <rect x="550" y="330" width="18" height="24" fill="url(#windowGlow)" opacity="0.9"/>
    <rect x="580" y="330" width="18" height="24" fill="url(#windowGlow)"/>
    <rect x="610" y="330" width="18" height="24" fill="url(#windowGlow)" opacity="0.8"/>
    <rect x="550" y="370" width="18" height="24" fill="url(#windowGlow)"/>
    <rect x="580" y="370" width="18" height="24" fill="url(#windowGlow)" opacity="0.9"/>
    <rect x="610" y="370" width="18" height="24" fill="url(#windowGlow)"/>
    <rect x="550" y="410" width="18" height="24" fill="url(#windowGlow)" opacity="0.8"/>
    <rect x="580" y="410" width="18" height="24" fill="url(#windowGlow)"/>
    <rect x="610" y="410" width="18" height="24" fill="url(#windowGlow)" opacity="0.9"/>
    
    <!-- Right side windows -->
    <rect x="1105" y="380" width="15" height="20" fill="url(#windowGlow)"/>
    <rect x="1130" y="380" width="15" height="20" fill="url(#windowGlow)" opacity="0.8"/>
    <rect x="1155" y="380" width="15" height="20" fill="url(#windowGlow)"/>
    <rect x="1105" y="420" width="15" height="20" fill="url(#windowGlow)" opacity="0.9"/>
    <rect x="1130" y="420" width="15" height="20" fill="url(#windowGlow)"/>
    <rect x="1155" y="420" width="15" height="20" fill="url(#windowGlow)" opacity="0.7"/>
  </g>
  
  <!-- Bottom circuit lines (subtle) -->
  <g opacity="0.1" stroke="#4a8aa8" stroke-width="1.5" fill="none">
    <path d="M 0 950 L 300 950 L 300 900 L 500 900"/>
    <path d="M 1920 960 L 1600 960 L 1600 920 L 1400 920"/>
    <path d="M 600 980 L 1000 980 L 1000 940 L 1200 940"/>
  </g>
  
  <!-- Ground reflection line -->
  <rect x="0" y="1070" width="1920" height="10" fill="#9ab0c8" opacity="0.2"/>
</svg>
